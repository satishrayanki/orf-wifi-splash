<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Norfolk International Airport – Free Wi-Fi</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orf-blue: #003087;
      --orf-accent: #0072ce;
      --orf-green: #5a9e2f;
      --orf-green-hover: #4a8a25;
      --white: #ffffff;
      --light-gray: #f4f6f9;
      --border: #dde3ed;
      --text: #222;
      --text-muted: #555;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Open Sans', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #1a3a6b;
    }

    /* ══════════════════════════════════════
       LOGO BAR — full width white strip
       Replace URL below with your GitHub Pages path once uploaded
       e.g. https://YOUR-USERNAME.github.io/orf-wifi-splash/NIA-Horizontal-Logo-4c.jpg
    ══════════════════════════════════════ */
    .logo-bar {
      width: 100%;
      background: var(--white);
      padding: 16px 40px 13px;
      text-align: center;
      border-bottom: 3px solid var(--orf-accent);
      flex-shrink: 0;
    }

    .logo-bar img {
      max-height: 68px;
      max-width: 320px;
      width: auto;
      object-fit: contain;
      display: inline-block;
    }

    /* Text fallback if image doesn't load */
    .logo-bar .logo-text-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .logo-bar .logo-text-fallback .lt {
      font-family: 'Montserrat', sans-serif;
      font-size: 34px;
      font-weight: 800;
      color: var(--orf-blue);
      letter-spacing: 5px;
    }
    .logo-bar .logo-text-fallback .ll {
      width: 110px;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--orf-accent), var(--orf-blue), transparent);
      border-radius: 3px;
    }
    .logo-bar .logo-text-fallback .ls {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 700;
      color: var(--orf-accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════
       BACKGROUND SECTION — starts below logo bar
       Replace URL below with your GitHub Pages path once uploaded
       e.g. https://YOUR-USERNAME.github.io/orf-wifi-splash/Back_Ground_NAA.jpg
    ══════════════════════════════════════ */
    .page-bg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background-image: url('https://satishrayanki.github.io/orf-wifi-splash/Back_Ground_NAA.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      position: relative;
    }

    .page-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,30,80,0.60) 0%, rgba(0,60,140,0.42) 100%);
      z-index: 0;
    }

    /* ══════════════════════════════════════
       CARD
    ══════════════════════════════════════ */
    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      animation: fadeUp 0.6s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card body */
    .card-body {
      background: var(--light-gray);
      padding: 28px 30px 10px;
      text-align: center;
    }

    .card-body h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--orf-blue);
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .card-body h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--orf-accent);
      margin-bottom: 14px;
    }

    .card-body p {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto 20px;
    }

    /* Wi-Fi SVG icon */
    .wifi-icon {
      margin: 0 auto 20px;
      width: 56px;
      height: 56px;
    }
    .wifi-icon svg { width: 100%; height: 100%; }

    /* Checkboxes */
    .card-form {
      background: var(--white);
      margin: 0 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .check-row:last-child { border-bottom: none; }

    .check-row input[type="checkbox"] {
      flex-shrink: 0;
      margin-top: 2px;
      width: 17px;
      height: 17px;
      accent-color: var(--orf-accent);
      cursor: pointer;
    }

    .check-row label {
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      line-height: 1.5;
    }
    .check-row label strong { color: var(--orf-blue); }
    .check-row label a {
      color: var(--orf-accent);
      font-style: italic;
      text-decoration: none;
    }
    .check-row label a:hover { text-decoration: underline; }

    /* Connect button */
    .card-actions {
      padding: 18px 30px;
      background: var(--light-gray);
      text-align: center;
    }

    .btn-connect {
      display: block;
      width: 100%;
      padding: 15px;
      background: var(--orf-green);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(90,158,47,0.35);
    }
    .btn-connect:hover {
      background: var(--orf-green-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(90,158,47,0.45);
    }
    .btn-connect:active { transform: translateY(0); }
    .btn-connect:disabled {
      background: #aaa;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .aup-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--orf-accent);
      text-decoration: none;
    }
    .aup-link:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .logo-bar { padding: 12px 16px 10px; }
      .logo-bar img { max-height: 52px; }
      .page-bg { padding: 24px 16px; }
      .card-body { padding: 22px 20px 10px; }
      .card-body h1 { font-size: 19px; }
      .card-form { margin: 0 20px; }
      .card-actions { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <!-- ── Logo bar ── -->
  <div class="logo-bar">
    <img
      src="https://satishrayanki.github.io/orf-wifi-splash/NIA-Horizontal-Logo-4c.jpg"
      alt="Norfolk International Airport"
      onerror="this.style.display='none'; document.getElementById('logo-fb').style.display='flex';"
    />
    <div class="logo-text-fallback" id="logo-fb">
      <div class="lt">ORF</div>
      <div class="ll"></div>
      <div class="ls">Norfolk International Airport</div>
    </div>
  </div>

  <!-- ── Background + Card ── -->
  <div class="page-bg">
    <div class="card">

      <div class="card-body">
        <h1>ORF Keeps you Connected.</h1>
        <h2>Enjoy Free Terminal-Wide Wi-Fi</h2>
        <p>We've made your travel experience even smoother. ORF now offers free, high-speed Wi-Fi for all travelers and guests.</p>

        <div class="wifi-icon">
          <svg viewBox="0 0 80 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 44 a4 4 0 1 1 0 8 a4 4 0 0 1 0-8z" fill="#0072ce"/>
            <path d="M25 34 Q40 22 55 34" stroke="#0072ce" stroke-width="5.5" stroke-linecap="round" fill="none"/>
            <path d="M13 23 Q40 5 67 23" stroke="#003087" stroke-width="5.5" stroke-linecap="round" fill="none"/>
            <path d="M2 12 Q40 -8 78 12" stroke="#003087" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.35"/>
          </svg>
        </div>
      </div>

      <div class="card-form">
        <div class="check-row">
          <input type="checkbox" id="chk1" onchange="updateBtn()"/>
          <label for="chk1">
            <strong>Connect to FlyORFwifi</strong> on your device and enjoy unlimited browsing before your flight.
          </label>
        </div>
        <div class="check-row">
          <input type="checkbox" id="chk2" onchange="updateBtn()"/>
          <label for="chk2">
            I Agree with the Wi-Fi System <a href="#" onclick="return false;">User Agreement and Acceptable Use Policy</a>
          </label>
        </div>
      </div>

      <div class="card-actions">
        <button class="btn-connect" id="connectBtn" disabled onclick="handleConnect()">Connect</button>
        <a class="aup-link" href="#" onclick="return false;">Acceptable Use Policy</a>
      </div>

    </div>
  </div>

<script>
  function updateBtn() {
    var c1 = document.getElementById('chk1').checked;
    var c2 = document.getElementById('chk2').checked;
    document.getElementById('connectBtn').disabled = !(c1 && c2);
  }

  function handleConnect() {
    var btn = document.getElementById('connectBtn');
    btn.textContent = 'Connecting…';
    btn.disabled = true;
    // Grab Meraki's continue_url from the query string
    var params = new URLSearchParams(window.location.search);
    var continueUrl = params.get('continue_url') || 'https://norfolkairport.com';
    setTimeout(function() {
      window.location.href = continueUrl;
    }, 1500);
  }
</script>

</body>
</html>
